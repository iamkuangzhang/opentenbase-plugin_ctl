plugin_id: pluginctl_smoke_plugin
name: PluginCtl Smoke Plugin
version: 0.1.0
description: Minimal sample plugin for a safe M1 lifecycle closed loop.
database: OpenTenBase
targets:
  cn: true
  dn: true
distributed:
  required_roles:
    - coordinator
  probe_strategy: coordinator
  notes: Runs through coordinator only.
hooks:
  preinstall:
    coordinator:
      - examples/plugins/pluginctl_smoke_plugin/payload/hooks/preinstall.sql
  postinstall:
    coordinator:
      - examples/plugins/pluginctl_smoke_plugin/payload/hooks/postinstall.sql
  preuninstall:
    coordinator:
      - examples/plugins/pluginctl_smoke_plugin/payload/hooks/preuninstall.sql
  postuninstall:
    coordinator:
      - examples/plugins/pluginctl_smoke_plugin/payload/hooks/postuninstall.sql
payload:
  source_root: examples/plugins/pluginctl_smoke_plugin/payload
  install_sql: examples/plugins/pluginctl_smoke_plugin/payload/sql/install.sql
  verify_sql: examples/plugins/pluginctl_smoke_plugin/payload/sql/verify.sql
  smoke_sql: examples/plugins/pluginctl_smoke_plugin/payload/sql/verify.sql
  rollback_sql: examples/plugins/pluginctl_smoke_plugin/payload/sql/rollback.sql
  installed_probe: SELECT pluginctl_smoke_plugin.version();
  verify_expect_stdout: ok
  removed_probe: SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM information_schema.schemata WHERE schema_name = 'pluginctl_smoke_plugin') THEN 'removed' ELSE 'present' END;
notes:
  - This is a controlled sample plugin for platform verification.
  - It is safe to deploy and roll back repeatedly in the current Docker cluster.
