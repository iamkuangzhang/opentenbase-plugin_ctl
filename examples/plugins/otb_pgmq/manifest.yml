plugin_id: otb_pgmq
name: OpenTenBase PGMQ
version: 1.11.2-otb.0
description: OpenTenBase adaptation of PGMQ for PluginCtl lifecycle validation.
database: OpenTenBase
targets:
  cn: true
  dn: true
distributed:
  required_roles:
    - coordinator
    - datanode
  probe_strategy: coordinator
  notes: SQL-only queue operations run through the coordinator; distributed semantics are still under validation.
payload:
  source_root: examples/plugins/otb_pgmq/payload
  install_sql: examples/plugins/otb_pgmq/payload/sql/install.sql
  verify_sql: examples/plugins/otb_pgmq/payload/sql/verify.sql
  smoke_sql: examples/plugins/otb_pgmq/payload/sql/verify.sql
  rollback_sql: examples/plugins/otb_pgmq/payload/sql/rollback.sql
  installed_probe: SELECT pgmq.version();
  verify_expect_stdout: ok
  removed_probe: SELECT CASE WHEN to_regnamespace('pgmq') IS NULL THEN 'removed' ELSE 'present' END;
  upstream:
    repository: https://github.com/pgmq/pgmq
    commit: 02cffd7
    license: PostgreSQL License
notes:
  - Based on PGMQ with OpenTenBase compatibility patches.
  - MVP supports non-partitioned logged queues only.
  - Partitioned queues, pg_partman, topic routing, unlogged queues, and Rust client integration are out of scope.
