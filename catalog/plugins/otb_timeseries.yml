plugin_id: otb_timeseries
name: OpenTenBase TimeSeries
version: 1.0.0
description: Sample time-series plugin for the first OpenTenBase PluginCtl closed loop.
database: OpenTenBase
targets:
  cn: true
  dn: true
distributed:
  required_roles:
    - coordinator
    - datanode
  probe_strategy: coordinator
  notes: Expected to affect distributed time-series tables; chunk distribution warning is tracked separately.
payload:
  source_root: examples/plugins/legacy_payloads/otb_timeseries
  install_sql: examples/plugins/legacy_payloads/otb_timeseries/core/sql/otb_timeseries--1.0.sql
  verify_sql: recipes/otb_timeseries_smoke.sql
  smoke_sql: recipes/otb_timeseries_smoke.sql
  installed_probe: SELECT otb_ts.version();
notes:
  - Imported from the legacy OpenTenBase PluginCtl plugin payloads for governance validation.
  - Do not add destructive rollback for this real plugin sample.
